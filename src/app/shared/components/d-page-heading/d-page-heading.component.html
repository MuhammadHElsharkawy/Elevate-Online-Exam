<section class="grid  gap-2.5"
[class.grid-cols-[auto_1fr]]="withBack()"
>
  @if (withBack()) {
    <button (click)="goBack()"
      class="w-9.5 cursor-pointer flex items-center justify-center bg-white text-blue-600 border border-blue-600"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-chevron-left-icon lucide-chevron-left"
      >
        <path d="m15 18-6-6 6-6" />
      </svg>
    </button>
  }
  <div class="flex items-center gap-4 p-4 bg-blue-600 text-white w-full">
    <div class="" [innerHTML]="svgIcon"></div>
    <h2 class="text-[32px] font-semibold">{{ title() }}</h2>
  </div>
</section>
