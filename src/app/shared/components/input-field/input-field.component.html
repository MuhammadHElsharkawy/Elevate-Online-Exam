<section>
  @if (inputLabel()) {
    <label [for]="inputId()" class="font-medium text-gray-800 block">
      {{ inputLabel() }}
      @if (redStar()) {
        <span class="text-red-600">*</span>
      }
    </label>
  }
  @if (inputType() != 'password') {
    <input
      [readOnly]="isReadOnly()"
      [id]="inputId()"
      [type]="inputType() || 'text'"
      class="w-full border p-2.5 placeholder:text-gray-400 placeholder:text-sm disabled:border-gray-200 disabled:bg-gray-100 disabled:text-gray-600"
      [class.border-gray-200]="!isInValid"
      [class.border-red-600]="isInValid"
      [placeholder]="inputPlaceholder() || ''"
      [formControl]="formControl"
    />
  }
  @if (inputType() == 'password') {
    <div class="relative">
      <input
        [readOnly]="isReadOnly()"
        [id]="inputId()"
        [type]="type()"
        class="w-full border p-2.5 placeholder:text-gray-400 placeholder:text-sm"
        [class.border-gray-200]="!isInValid"
        [class.border-red-600]="isInValid"
        [placeholder]="inputPlaceholder() || ''"
        [formControl]="formControl"
      />
      <div
        (click)="toggleShowPassword()"
        class="absolute top-1/2 right-2.5 -translate-y-1/2 text-gray-400 cursor-pointer"
      >
        @if (isPasswordShown()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-eye-icon lucide-eye"
          >
            <path
              d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
            />
            <circle cx="12" cy="12" r="3" />
          </svg>
        }
        @if (!isPasswordShown()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-eye-off-icon lucide-eye-off"
          >
            <path
              d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"
            />
            <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
            <path
              d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"
            />
            <path d="m2 2 20 20" />
          </svg>
        }
      </div>
    </div>
  }
</section>
