<section>
  <div class="flex justify-between items-center gap-1.5 mb-2.5">
    <div class="w-2.5 h-2.5 bg-blue-600 rotate-45 shrink-0"></div>
    <div class="border border-blue-600 w-full"></div>
    <div class="w-5.25 h-5.25 bg-blue-100 rotate-45 flex items-center justify-center shrink-0">
      <div class="w-2.5 h-2.5 bg-blue-600"></div>
    </div>
    <div class="border border-dashed border-blue-600 w-full"></div>
    <div class="w-2.5 h-2.5 bg-blue-100 border border-blue-600 rotate-45 shrink-0"></div>
    <div class="border border-dashed border-blue-600 w-full"></div>
    <div class="w-2.5 h-2.5 bg-blue-100 border border-blue-600 rotate-45 shrink-0"></div>
  </div>
  <h1 class="text-3xl font-bold text-gray-800 Finter mb-4">Create Account</h1>
  <h2 class="text-2xl font-bold text-blue-600 mb-2.5 Finter">Verify OTP</h2>
  <div class="">
    <form class="FgMono">
      <p class="text-gray-500 mb-6.5">
        Please enter the 6-digits code we have sent to:
        <span class="text-gray-800">{{ emailControl().value }} </span>.
        <button
          (click)="$event.preventDefault(); goBack()"
          class="cursor-pointer underline text-blue-600"
        >
          Edit
        </button>
      </p>
      <div class="flex justify-center">
        <ng-otp-input
          (onInputChange)="onOtpChange($event)"
          [config]="{
            length: 6,
            allowNumbersOnly: true,
            inputStyles: {
              width: '40px',
              height: '40px',
              'border-radius': '0px',
              'border-color': '#E5E7EB',
            },
          }"
        ></ng-otp-input>
      </div>
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-500">
          You can request another code in: {{ timeLeft() }}s
          <button
            (click)="$event.preventDefault(); handleResendCode()"
            [hidden]="timeLeft() > 0"
            class="cursor-pointer text-blue-600 font-semibold hover:underline disabled:text-gray-400 disabled:no-underline disabled:cursor-not-allowed"
          >
            Resend Code
          </button>
        </p>
      </div>
      <div class="text-center mt-14">
        <button
          [disabled]="isLooding() || codeControl().invalid"
          (click)="$event.preventDefault(); handleSendCode()"
          class="cursor-pointer text-gray-800 text-sm font-medium disabled:opacity-40 disabled:cursor-no-drop"
        >
          Verify Code
        </button>
      </div>
    </form>
  </div>
</section>
