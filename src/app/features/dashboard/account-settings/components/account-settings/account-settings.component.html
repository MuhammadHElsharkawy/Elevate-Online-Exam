<main class="bg-gray-50 min-h-screen flex flex-col">
  <app-d-breadcrumb [bath]="['Account']"></app-d-breadcrumb>
  <section class="p-6 flex flex-col gap-6 grow">
    <app-d-page-heading
      [withBack]="true"
      title="Account Settings"
      [svgContent]="usericon"
    ></app-d-page-heading>

    <div class="grid gap-6 grid-cols-4 grow">
      <div class="col-span-1 bg-white p-6 flex flex-col justify-between">
        <div class="flex flex-col gap-2.5">
          <a
            routerLink="/main/account-settings/profile"
            routerLinkActive="text-blue-600! bg-blue-50"
            class="py-2.5 px-4 flex items-center gap-2.5 text-gray-500"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-circle-user-round-icon lucide-circle-user-round"
            >
              <path d="M17.925 20.056a6 6 0 0 0-11.851.001" />
              <circle cx="12" cy="11" r="4" />
              <circle cx="12" cy="12" r="10" />
            </svg>
            <span>Profile</span>
          </a>
          <a
            routerLink="/main/account-settings/change-password"
            routerLinkActive="text-blue-600! bg-blue-50"
            class="py-2.5 px-4 flex items-center gap-2.5 text-gray-500"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-lock-icon lucide-lock"
            >
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <span>Change Password</span>
          </a>
        </div>
        <button
          (click)="logout()"
          class="bg-red-50 text-red-600 flex py-2.5 px-4 gap-2.5 cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-log-out-icon lucide-log-out"
          >
            <path d="m16 17 5-5-5-5" />
            <path d="M21 12H9" />
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          </svg>
          <span>Logout</span>
        </button>
      </div>
      <div class="col-span-3 bg-white p-6">
        <router-outlet></router-outlet>
      </div>
    </div>
  </section>
</main>
